<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="./assets/Matte16bitPNG-BpmPYVrK.png" />

  <!--Google Font-->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Honk:MORF@15&family=Jersey+15&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AddioAlCelimatte</title>
  <script type="module" crossorigin src="./assets/index-NrEkYOca.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Csjdrjf0.css">
</head>

<body>
  <main>
    <section id="home">

      <header class="header-style">
        <h3 class="small-title">Addio al</h3>
        <h1 class="big-title">CeliMatte</h1>
      </header>

      <div class="homescreen-container">
        <img class="homescreenImgFront" src="./assets/Matte16bitPNG-BpmPYVrK.png">
        <img class="homescreenImgBack" src="./assets/elisa1-CYDQFef4.png">
      </div>

      

      <div class="button-bottom-container">
        <button id="btnHome" class="button-bottom">Inizia</button>
      </div>
    </section>

    <section id="chooseMinigame">
      <header>
        <h1>Scegli il minigioco</h1>
      </header>
      <div id="choosePlayerContainer" class="chooseGame-container">
        <label>Minigiochi disponibili</label>

        <button id="flapppyCelibeBtn" class="chooseGame-btn-style">Flappy Celibe ►</button>
        <button id="memeMemoryBtn" class="chooseGame-btn-style">Find the Etero ►</button>
        <button id="thirdMinigameBtn" class="chooseGame-btn-style">Da Decidere ►</button>

      </div>
      <div class="button-bottom-container">
        <button id="openSkinDialogBtn" class="button-bottom">Skin sbloccate</button>
      </div>
    </section>

    <section id="flappyBirdSection">
      <canvas id="flappyBirdCanvas"> </canvas>
    </section>

  </main>
  <!--DIALOG-->
  <dialog id="dialog" class="dialog-style">
    <h2 tabindex="-1" id="dialogTitleContainer" class="header-style">Prima di cominciare...</h2>
    <p id="dialogContent"></p>
    <div class="dialog-actions">
      <button id="closeDialogBtn" class="button-bottom">Acc' capit</button>
    </div>

  </dialog>

  <dialog id="skinDialog" class="dialog-style">
    <h2 tabindex="-1" id="dialogTitleContainer" class="header-style">Skin sbloccate</h2>
    <p id="dialogContent"></p>
    <div class="skin-container">

      <div class="skinContainer">
        <img class="skinImg" src="./assets/questionMark-B2Jln1MQ.png">
        <label id="skin1Name">Unknown</label>
      </div>

      <div class="skinContainer">
        <img class="skinImg" src="./assets/questionMark-B2Jln1MQ.png">
        <label id="skin2Name">Unknown</label>
      </div>

      <div class="skinContainer">
        <img class="skinImg" src="./assets/questionMark-B2Jln1MQ.png">
        <label id="skin3Name">Unknown</label>
      </div>

    </div>
    <button id="closeSkinDialogBtn" class="button-bottom">Acc' capit</button>
  </dialog>
</body>

</html>
